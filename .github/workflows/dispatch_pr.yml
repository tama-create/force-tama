name: "🛠️ リリースフロー制御"

on:
  workflow_dispatch:
    inputs:
      flow_type:
        description: '実行するアクションを選択'
        required: true
        type: choice
        options:
          - '1. DEVELOP -> STAGING (下書きPR作成)'
          - '2. STAGING -> MAIN (下書きPR作成)'
          - '3. 検証完了！レビュー依頼を出す'
      pr_number:
        description: '「3」の場合のみ、PR番号を入力してください'
        required: false
        type: string

jobs:
  manage-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- PR作成フェーズ (1 or 2) ---
      - name: Create Draft PR
        if: contains(github.event.inputs.flow_type, 'PR作成')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 選択肢に応じてブランチを決定
          if [[ "${{ github.event.inputs.flow_type }}" == *"STAGING"* ]]; then
            HEAD="DEVELOP"; BASE="STAGING"
          else
            HEAD="STAGING"; BASE="MAIN"
          fi
          
          # GitHub CLIを使って下書きPRを作成
          gh pr create \
            --head "$HEAD" \
            --base "$BASE" \
            --title "【検証中】$HEAD -> $BASE" \
            --body "動作検証が終わったら、このPR番号を指定して『レビュー依頼ボタン』を実行してください。" \
            --draft

      # --- レビュー依頼フェーズ (3) ---
      - name: Request Review
        if: contains(github.event.inputs.flow_type, 'レビュー依頼')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=${{ github.event.inputs.pr_number }}
          # 下書き解除
          gh pr ready $PR_NUM
          # レビュアーを指定（ユーザー名をカンマ区切りで入力）
          gh pr edit $PR_NUM --add-reviewer "ここにレビュアーのGitHubID"
          # コメント追加
          gh pr comment $PR_NUM --body "🚀 動作検証が完了しました。レビューをお願いします！"