# ==============================================================================
# sf-metasync.yml - Salesforce メタデータ自動同期（平日 9〜19時・毎時定期実行）
# ==============================================================================
# 本番組織（prod）の最新メタデータを取得し、main ブランチへ自動同期します。
# 同期後は staging・develop ブランチへも直接伝播します。
#
# 【実行タイミング】
#   - 平日（月〜金）の日本時間 9:00〜19:00、1時間おきに自動実行
#   - GitHub 画面の「Run workflow」ボタンで手動実行も可能
#
# 【処理の流れ】
#   1. 本番組織（prod）からメタデータを取得
#   2. 変更があれば main へ commit & push
#   3. main → staging → develop へ直接伝播
# ==============================================================================
name: sf-metasync メタデータ自動同期（定期実行）

# ------------------------------------------------------------------------------
# 実行トリガーの設定
# ------------------------------------------------------------------------------
on:
  schedule:
    # 定期実行のスケジュール（UTC時刻で指定）
    # 記述: 0分 / 0時〜10時 / 毎日 / 毎月 / 月曜〜金曜
    # 意味: 平日（月〜金）の日本時間 9:00 〜 19:00 の間、1時間おきに実行される
    - cron: "0 0-10 * * 1-5"

  # 手動実行の許可（GitHubの画面上から「Run workflow」ボタンで任意のタイミングで実行可能にする）
  workflow_dispatch:

# ------------------------------------------------------------------------------
# ジョブの定義
# ------------------------------------------------------------------------------
jobs:
  sync:
    name: sf-metasync メタデータを取得して Git へ同期
    # 実行環境: GitHubが提供する最新のUbuntu（Linux）ランナーを使用
    runs-on: ubuntu-latest

    # 権限設定: このワークフロー実行時に発行されるトークン（GITHUB_TOKEN）の権限
    permissions:
      # スクリプト内で `git push` を実行するため、リポジトリ内容の書き込み権限を明示的に付与
      contents: write

    # --------------------------------------------------------------------------
    # 実行ステップ
    # --------------------------------------------------------------------------
    steps:
      # Step 1: リポジトリのソースコードをランナー環境にチェックアウト（取得）する
      - name: ソースコードを取得
        uses: actions/checkout@v6
        with:
          # 同期対象の基準となるブランチを指定
          ref: main
          # 履歴の取得深さを指定。'0' は全履歴を取得する。
          # Salesforce Git Delta (SGD) が過去のコミットと現在の差分を比較するために必須。
          fetch-depth: 0

      # Step 2: Salesforce CLI を動かすための Node.js 環境を構築
      - name: Node.js をインストール
        uses: actions/setup-node@v6
        with:
          node-version: "20" # 安定稼働実績のあるバージョン20を指定

      # Step 3: Salesforce Git Delta (SGD) プラグインを動かすための Java 環境を構築
      - name: Java をインストール（差分抽出ツール用）
        uses: actions/setup-java@v5
        with:
          distribution: "temurin" # オープンソースで標準的なTemurinディストリビューション
          java-version: "17" # SGDの実行推奨要件を満たすバージョン17を指定

      # Step 4: Salesforce CLI (sfコマンド) のインストール
      - name: Salesforce CLI をインストール
        run: npm install --global @salesforce/cli

      # Step 5: 差分抽出ツール (Salesforce Git Delta) のインストール
      - name: 差分抽出ツール（Salesforce Git Delta）をインストール
        # インストール時の「プラグインを信頼しますか？」というプロンプトを 'echo y' で自動突破
        run: echo y | sf plugins install sfdx-git-delta

      # Step 6: Salesforce組織への認証（ログイン）
      - name: 組織にログイン
        run: |
          # GitHub Secrets に登録した SFDX_AUTH_URL_PROD を一時ファイルに書き出し
          echo "${{ secrets.SFDX_AUTH_URL_PROD }}" > auth.txt
          # 認証ファイルを使ってログインし、この組織をデフォルト（エイリアス: tama）として設定
          sf org login sfdx-url --sfdx-url-file auth.txt --set-default --alias tama
          # セキュリティのため、認証完了後は即座にURLファイルを削除
          rm -f auth.txt

      # Step 7: Gitのコミット者情報の初期設定
      - name: Git ユーザー情報を設定
        run: |
          # スクリプト内で自動コミットされる際のユーザー名とメールアドレスを設定
          # GitHub Actions のボットとして明示することで、手動コミットと区別しやすくする
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Step 8: sf-tools のクローン（sf-metasync.sh の実行に必要）
      - name: 自動化ツール（sf-tools）を取得
        run: git clone https://github.com/tamashimon-create/sf-tools.git ~/sf-tools

      # Step 9: Salesforce組織からのメタデータ取得・Git同期スクリプトの実行
      - name: メタデータ取得・Git 同期を実行
        run: |
          # 前の手順でクローンされた同期用スクリプトに実行権限を付与
          chmod +x ~/sf-tools/sf-metasync.sh
          # 実行（差分取得、メタデータダウンロード、Gitへのコミット・プッシュが行われる）
          ~/sf-tools/sf-metasync.sh

      # Step 10: 失敗時に Slack 通知
      - name: Slack に失敗を通知
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DATETIME=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S JST')
          MESSAGE=":x: *Salesforce メタデータ自動同期が失敗しました*\n• 実行日時: ${DATETIME}\n• <${RUN_URL}|Actions ログを見る>"
          PAYLOAD="{\"channel\": \"${SLACK_CHANNEL_ID}\", \"text\": \"${MESSAGE}\"}"
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
